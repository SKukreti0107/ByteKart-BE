services:
  api:
    build: .
    container_name: bytekart-be
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - ./public:/app/public
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
